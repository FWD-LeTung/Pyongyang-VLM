model_name: "openai/clip-vit-base-patch16"

retrieval:
  backend: "tbps_clip"
  tbps_root: "src/matching_engine/TBPS-CLIP"
  config_path: "src/matching_engine/TBPS-CLIP/config/config.yaml"
  checkpoint_path: "weights/checkpoint_best.pth"
  device: "cuda"
  precision: "fp16"

candidate:
  min_total_images: 3
  min_total_chunks: 1

chunk:
  samples_per_chunk: 3
  max_samples_per_chunk: 5
  min_images_per_chunk: 1
  sampling_strategy: "quality_even"

cache:
  enabled: true
  dtype: "fp16"
  device: "cuda"
  storage: "memory"

track_scoring:
  crop_topk: 2
  top_chunks: 5
  aggregation: "top_chunks_mean"

confidence:
  ambiguous_margin_threshold: 0.005

runtime:
  encode_batch_size: 32

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - out_proj
    # Optional MLP targets for ablation:
    - fc1
    - fc2

trainable:
  unfreeze_projection: true
  unfreeze_logit_scale: true

distributed:
  find_unused_parameters: true

loss:
  name: "multi_positive"
  id:
    enabled: true
    weight: 0.5

augmentation:
  enabled: true
  random_resized_crop:
    enabled: true
    scale: [0.85, 1.0]
  horizontal_flip:
    enabled: true
    p: 0.5
  rotation:
    enabled: true
    degrees: 5
  color_jitter:
    enabled: true
    brightness: 0.1
    contrast: 0.1
    saturation: 0.1
    hue: 0.0
  random_erasing:
    enabled: true
    p: 0.1

batch_size: 64
learning_rate: 0.0001
epochs: 50
patience: 5

quantization:
  enabled: false
  load_in_4bit: false
  load_in_8bit: false

dataset_root: "data/CUHK-PEDES"
output_weights_dir: "weights/"
