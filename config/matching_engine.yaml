model_name: "openai/clip-vit-base-patch16"

lora:
  r: 8
  alpha: 16
  dropout: 0.1
  target_modules: ["q_proj", "v_proj"]

batch_size: 64
learning_rate: 0.0001
epochs: 50
patience: 5

quantization:
  enabled: false
  load_in_4bit: false
  load_in_8bit: false

dataset_root: "data/CUHK-PEDES"
output_weights_dir: "weights/"
